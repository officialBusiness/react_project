<!DOCTYPE html>
<html lang="en">
	<head>
		<title>3d_bat</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<link type="text/css" rel="stylesheet" href="../../../examples/main.css">
	</head>

	<body>

		<div id="container"></div>

		<script type="module">

			import * as THREE from '../../../build/three.module.js';

			import Stats from '../../../examples/jsm/libs/stats.module.js';

			import { GUI } from '../../../examples/jsm/libs/dat.gui.module.js';
			import { OrbitControls } from '../../../examples/jsm/controls/OrbitControls.js';
			import { PCDLoader } from '../../../examples/jsm/loaders/PCDLoader.js';


			const renderer = new THREE.WebGLRenderer( { antialias: true } );
			renderer.setPixelRatio( window.devicePixelRatio );
			renderer.setClearColor( 0x000000, 0.0 );
			renderer.setSize( window.innerWidth, window.innerHeight );
			document.body.appendChild( renderer.domElement );

			const scene = new THREE.Scene();
			window.scene = scene;

			const axesHelper = new THREE.AxesHelper( 10 );
			scene.add( axesHelper );

			const stats = new Stats();
			document.body.appendChild( stats.dom );

			const camera1 = new THREE.PerspectiveCamera( 60, window.innerWidth / window.innerHeight, 1, 1000 );
			// const camera1 = new THREE.OrthographicCamera( -10, 10, 10, -10, 0, 10000 );
			camera1.position.set( 0, 10, 0 )
			camera1.lookAt( 0, 0, 0 );
			window.camera1 = camera1;

			const camera2 = new THREE.PerspectiveCamera( 60, window.innerWidth / window.innerHeight, 1, 1000 );
			// const camera2 = new THREE.PerspectiveCamera( 60, window.innerWidth / window.innerHeight, 1, 1000 );

			const camera3 = new THREE.PerspectiveCamera( 60, window.innerWidth / window.innerHeight, 1, 1000 );
			// const camera3 = new THREE.PerspectiveCamera( 60, window.innerWidth / window.innerHeight, 1, 1000 );

			const controls = new OrbitControls( camera1, renderer.domElement );
			const target = controls.target;
			controls.target.set(0, 0, 0);
			// controls.enableRotate = false;


			let pcd = null
			const loader = new PCDLoader();
			loader.load( './assets/NuScenes/ONE/pointclouds/000000.pcd', function ( points ) {
				pcd = points
				points.rotateX( -Math.PI / 2 )
				points.material.color = new THREE.Color( 0xffffff );
				points.material.size = 0.02
				scene.add( points );
			} );



			window.addEventListener( 'resize', onWindowResize );
			function onWindowResize() {
				camera1.aspect = window.innerWidth / window.innerHeight;
				camera1.updateProjectionMatrix();
				camera2.aspect = window.innerWidth / window.innerHeight;
				camera2.updateProjectionMatrix();
				camera3.aspect = window.innerWidth / window.innerHeight;
				camera3.updateProjectionMatrix();

				renderer.setSize( window.innerWidth, window.innerHeight );
			}


			const geometry = new THREE.PlaneGeometry( 1000 ,1000 ,1, 1 );
			const material = new THREE.MeshBasicMaterial({
				visible: false,
				opacity: 0.4,
				transparent: true,
				color: 0xff0000
			})
			const plane = new THREE.Mesh( geometry, material );
			plane.rotateX( -Math.PI / 2 )
			window.plane = plane;
			scene.add( plane );

			let ranges = [],
				now_range = null;

			window.addEventListener( 'mousedown', onMouseDown );
			function onMouseDown( event ){
				if( now_range ){
					return;
				}else{
					controls.enableRotate = false;
					now_range = {}
				}
				getPoint( event, { isStart: true } );
			}
			window.addEventListener( 'mouseup', onMouseUp );
			function onMouseUp( event ){
				if( now_range.end ){
					return;
				}
				if( controls.enableRotate === false ){
					controls.enableRotate = true;
				}
				getPoint( event, { isEnd: true } );
				drawRange();
			}
			function getPoint( event, opt ){

				const raycaster = new THREE.Raycaster();
				const mouse = new THREE.Vector2(
					( event.clientX / window.innerWidth ) * 2 - 1,
					- ( event.clientY / window.innerHeight ) * 2 + 1
				);
				// 通过摄像机和鼠标位置更新射线
				raycaster.setFromCamera( mouse, camera1 );

				// 计算物体和射线的焦点
				const intersects = raycaster.intersectObject( plane );
				const point = intersects[0].point;

				if( opt.isStart ){
					now_range.start = point ;
				}else if( opt.isEnd ){
					now_range.end = point ;
				}

			}
			function drawRange(){
				console.log( 'now_range:', now_range );
				let minX, maxX,
					minZ, maxZ;
				if( now_range.start.x > now_range.end.x ){
					minX = now_range.end.x
					maxX = now_range.start.x
				}else{
					minX = now_range.start.x
					maxX = now_range.end.x
				}
				if( now_range.start.z > now_range.end.z ){
					minZ = now_range.end.z
					maxZ = now_range.start.z
				}else{
					minZ = now_range.start.z
					maxZ = now_range.end.z
				}

				let position = pcd.geometry.getAttribute( 'position' );
				let minY = -1, 
					maxY = 1;
				// for( let i = 0, len = position.count; i < len; i++ ){
				// 	let x = position.getX( i ),
				// 		y = position.getY( i ),
				// 		z = position.getZ( i )

				// 	if( x >= minX && x <= maxX && z >= minZ && z <= maxZ ){
				// 		if( minY === void 0 || minY > y ){
				// 			minY = y
				// 		}
				// 		if( maxY === void 0 || maxY < y ){
				// 			maxY = y
				// 		}
				// 	}
				// }
				console.log( 'minX:', minX, 'maxX:', maxX );
				console.log( 'minY:', minY, 'maxY:', maxY );
				console.log( 'minZ:', minZ, 'maxZ:', maxZ );

				let center = new THREE.Vector3( ( minX + maxX ) / 2, ( minY + maxY ) / 2, ( minZ + maxZ ) / 2 ),
					box = new THREE.Mesh(
						new THREE.BoxGeometry( maxX - minX, maxY - minY, maxZ - minZ ),
						[
							new THREE.MeshBasicMaterial({
								color: 0xffff00,
								transparent: true,
								opacity: 0.6,
								side: THREE.DoubleSide
							}),
							new THREE.MeshBasicMaterial({
								color: 0xffff00,
								transparent: true,
								opacity: 0.6,
								side: THREE.DoubleSide
							}),
							new THREE.MeshBasicMaterial({
								color: 0xff0000,
								transparent: true,
								opacity: 0.6,
								side: THREE.DoubleSide
							}),
							new THREE.MeshBasicMaterial({
								color: 0xff0000,
								transparent: true,
								opacity: 0.6,
								side: THREE.DoubleSide
							}),
							new THREE.MeshBasicMaterial({
								color: 0x0000ff,
								transparent: true,
								opacity: 0.6,
								side: THREE.DoubleSide
							}),
							new THREE.MeshBasicMaterial({
								color: 0x0000ff,
								transparent: true,
								opacity: 0.6,
								side: THREE.DoubleSide
							})
						] )
				console.log( 'center:', center )
				box.position.set( center.x, center.y, center.z )
				scene.add( box );
			}


			requestAnimationFrame( animate );
			function animate( time ) {

				requestAnimationFrame( animate );

				stats.update();
				// controls.update();

				render( time )
			}
			function render( time ){

				renderer.setClearColor( 0x000000, 1 );
				renderer.setViewport( 0, 0, window.innerWidth, window.innerHeight );
				renderer.render( scene, camera1 );


				renderer.setClearColor( 0x222222, 1 );

				renderer.setScissorTest( true );
				renderer.setScissor( 0, 0, window.innerWidth / 4, window.innerHeight / 4 );
				renderer.setViewport( 0, 0, window.innerWidth / 4, window.innerHeight / 4 );
				camera2.position.set( camera1.position.y, 0, 0 );
				camera2.lookAt( target.x, target.y, target.z );
				renderer.render( scene, camera2 );
				renderer.setScissorTest( false );


				renderer.setScissorTest( true );
				renderer.setScissor( window.innerWidth / 4 * 3, 0, window.innerWidth / 4, window.innerHeight / 4 );
				renderer.setViewport( window.innerWidth / 4 * 3, 0, window.innerWidth / 4, window.innerHeight / 4 );
				camera3.position.set( 0, 0, camera1.position.y );

				camera3.lookAt( target.x, target.y, target.z );
				renderer.render( scene, camera3 );
				renderer.setScissorTest( false );
			}
		</script>
	</body>
</html>

<!DOCTYPE html>
<html lang="en">
	<head>
		<title>get_line_side</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<link type="text/css" rel="stylesheet" href="../../examples/main.css">
	</head>

	<body>
		<canvas id="canvas"></canvas>
		<script type="module">

			import * as THREE from '../../build/three.module.js';

			import Stats from '../../examples/jsm/libs/stats.module.js';

			import { GUI } from '../../examples/jsm/libs/dat.gui.module.js';
			import { OrbitControls } from '../../examples/jsm/controls/OrbitControls.js';
			import { TransformControls } from '../../examples/jsm/controls/TransformControls.js';

			import Vector2 from './src/vector2.js'

			const renderer = new THREE.WebGLRenderer( {
				 antialias: true ,
				 canvas: document.getElementById('canvas')
			} );
			renderer.setPixelRatio( window.devicePixelRatio );
			renderer.setClearColor( 0x000000, 0.0 );
			renderer.setSize( window.innerWidth, window.innerHeight );
			document.body.appendChild( renderer.domElement );

			const scene = new THREE.Scene();

			const camera = new THREE.PerspectiveCamera( 60, window.innerWidth / window.innerHeight, 0.1, 1000 );
			camera.position.set( 0, 0, 10 );

			const orbit = new OrbitControls( camera, renderer.domElement );
			orbit.enableRotate = false;
			orbit.target.set(0, 0, 0);

			const stats = new Stats();
			document.body.appendChild( stats.dom );

			// 线
			let line_v1 = new Vector2( -3, 0 ),
				line_v2 = new Vector2( 3, 0 ),
				line_geometry = new THREE.BufferGeometry();
			line_geometry.setAttribute( 'position', new THREE.BufferAttribute( new Float32Array([
				line_v1.x,
				line_v1.y,
				0,
				line_v2.x,
				line_v2.y,
				0
			]) , 3 ) );
			scene.add( new THREE.Line( line_geometry, new THREE.LineBasicMaterial({
				color: 0xff0000,
			}) ) );
			// 线的两个节点
			let plane_length = 0.2;
			let line_p1 = new THREE.Mesh( new THREE.PlaneGeometry( plane_length, plane_length ), new THREE.MeshBasicMaterial({
					color: 0xffffff,
					side: THREE.DoubleSide
				}) )
			line_p1.position.set( line_v1.x, line_v1.y, 0 );
			let line_p2 = new THREE.Mesh( new THREE.PlaneGeometry( plane_length, plane_length ), new THREE.MeshBasicMaterial({
					color: 0xffffff,
					side: THREE.DoubleSide
				}) )
			line_p2.position.set( line_v2.x, line_v2.y, 0 );

			// 点
			let point_v = new Vector2( 0, 0 ),
				point_geometry = new THREE.BufferGeometry();
			point_geometry.setAttribute( 'position', new THREE.BufferAttribute( new Float32Array( [
				point_v.x,
				point_v.y,
				0
			] ), 3 ) );
			scene.add( new THREE.Points( point_geometry, new THREE.PointsMaterial({
				color: 0xff0000,
				size: 0.1,
				depthTest: false,
				depthWrite: false
			}) ) );
			// 点的节点;
			let point_p = new THREE.Mesh( new THREE.PlaneGeometry( plane_length, plane_length ), new THREE.MeshBasicMaterial({
					color: 0xffffff,
					side: THREE.DoubleSide,
					visible: false
				}) )
			point_p.position.set( point_v.x, point_v.y, 0 );



			// 控制器
			let transformControls = new TransformControls( camera, renderer.domElement );
			transformControls.showZ = false;
			transformControls.addEventListener( 'dragging-changed', function ( event ) {
				orbit.enabled = ! event.value;
			} );
			transformControls.addEventListener( 'objectChange', ( event )=>{
				select_position.array[ position_start ] = select_plane.position.x;
				select_position.array[ position_start + 1 ] = select_plane.position.y;
				select_position.array[ position_start + 2 ] = 0;
				select_position.needsUpdate = true;

				select_vector.copy( select_plane.position );
			} );
			scene.add( transformControls );

			let 
				line_position = line_geometry.getAttribute( 'position' ),
				point_position = point_geometry.getAttribute( 'position' ),
				position_start = 0,
				planes = {
					line_start: line_p1,
					line_end: line_p2,
					point: point_p
				},
				select_plane = null,
				select_vector = null,
				select_position = null,
				gui = new GUI()
			
			gui.add( { select_point: 'null' }, 'select_point' ).options( [
				'null', 'line_start', 'line_end', 'point'
			 ] ).onFinishChange(( value )=>{
			 	if( select_plane !== null ){
					transformControls.detach ( select_plane );
					scene.remove( select_plane );
			 	}
			 	if( value === 'null' ){
					select_plane = null;
			 	}else{
					select_plane = planes[value];
					scene.add( select_plane );
					transformControls.attach( select_plane );
			 	}
				switch ( value ){
					case 'null':
						select_position = null;
						select_vector = null;
						break;
					case 'line_start':
						select_position = line_position;
						select_vector = line_v1;
						position_start = 0;
						break;
					case 'line_end':
						select_position = line_position;
						select_vector = line_v2;
						position_start = 3;
						break;
					case 'point':
						select_position = point_geometry. getAttribute( 'position' );
						select_vector = point_v;
						position_start = 0;
						break;
				}
			});

			function get_side(){
				// console.log( 'point_v:', point_v );
				// console.log( 'line_v1:', line_v1 );
				// console.log( 'line_v2:', line_v2 );
				let line = line_v2.newSub( line_v1 ),
					line_p = point_v.newSub( line_v1 ),
					cross = line.cross( line_p );
				if( cross < 0 ){
					// console.log('在右侧')
					return '在右侧';
				}else if( cross > 0 ){
					// console.log('在左侧')
					return '在左侧';
				}else if( cross === 0 ){
					// console.log('在同一条线上')
					return '在同一条线上';
				}else{
					throw new Error( '计算出错,参数有误', cross );
				}


				// console.log( 'line:', line );
				// console.log( 'line_p:', line_p );
				// console.log( line.cross( line_p ) );
			}
			window.get_side = get_side;

			window.addEventListener( 'resize', onWindowResize );
			onWindowResize();
			function onWindowResize() {
				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				renderer.setSize( window.innerWidth, window.innerHeight );
			}

			animate();
			function animate() {
				requestAnimationFrame( animate );
				stats.update();
				renderer.render( scene, camera );

			}
		</script>
	</body>
</html>

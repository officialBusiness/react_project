<!DOCTYPE html>
<html lang="en">
	<head>
		<title>contain_points</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<link type="text/css" rel="stylesheet" href="../../examples/main.css">
	</head>

	<body>
		<canvas id="canvas"></canvas>

		<script type="module">

			import * as THREE from '../../build/three.module.js';

			import Stats from '../../examples/jsm/libs/stats.module.js';

			import { GUI } from '../../examples/jsm/libs/dat.gui.module.js';
			import { OrbitControls } from '../../examples/jsm/controls/OrbitControls.js';


			const renderer = new THREE.WebGLRenderer( {
				 antialias: true ,
				 canvas: document.getElementById('canvas')
			} );
			renderer.setPixelRatio( window.devicePixelRatio );
			renderer.setClearColor( 0x000000, 0.0 );
			renderer.setSize( window.innerWidth, window.innerHeight );
			document.body.appendChild( renderer.domElement );

			const scene = new THREE.Scene();
			const ratio = window.innerWidth / window.innerHeight
			const camera = new THREE.OrthographicCamera( 3 * ratio / - 2, 3 * ratio / 2, 3 * ratio / 2, 3 * ratio / - 2, 0.1, 1000 )
			camera.position.set( 0, 0, 2 );
			camera.lookAt( 0, 0, 0 );

			const stats = new Stats();
			document.body.appendChild( stats.dom );

			const points_buffergeometry = new THREE.BufferGeometry();
			const points_position = []
			const points_color = []
			const segments = 11;
			for(  let i = 0, len = segments * segments; i < len; i++ ){
				const col = i % segments;
				const row = ( i - col ) / segments;

				points_position.push( -1 + 2 / segments * row, 1 - 2 / segments * col , 0);
				points_color.push( 1, 0, 0 );
			}

			points_buffergeometry.setAttribute( 'position', new THREE.BufferAttribute( new Float32Array( points_position ), 3 ) );
			points_buffergeometry.setAttribute( 'customColor', new THREE.BufferAttribute( new Float32Array( points_color ), 3 ) );

			scene.add( new THREE.Points( points_buffergeometry, new THREE.ShaderMaterial({
				vertexShader: `
					attribute vec3 customColor;
					varying vec3 vColor;
					void main() {
						vColor = customColor;
						vec4 mvPosition = modelViewMatrix * vec4( position, 1.0 );
						gl_PointSize = 10.0 / -mvPosition.z ;
						gl_Position = projectionMatrix * mvPosition;
					}
				`,
				fragmentShader: `
					varying vec3 vColor;
					void main() {
						gl_FragColor = vec4( vColor, 1.0 );
					}
				`,
				side: THREE.DoubleSide
			}) ) );
			window.scene = scene

			const polygon_buffergeometry = new THREE.BufferGeometry();
			const polygon_position = []
			const material = new THREE.LineBasicMaterial({
				color: 0xffffff,
			})
			const line = new THREE.LineLoop( polygon_buffergeometry, material )
			scene.add( line );


			window.addEventListener( 'click', onWindowClick );
			function onWindowClick( event ){
				if( polygon_position.length === 3 * 3 ){
					return 
				}
				let x = ( event.clientX / window.innerWidth ) * 2 - 1,
					y = - ( event.clientY / window.innerHeight ) * 2 + 1;

				const standardVector = new THREE.Vector3(x, y, 0);
				const worldVector = standardVector.unproject(camera);

				polygon_position.push( worldVector.x, worldVector.y, 0 );
				setPolygonPosition();
				if( polygon_position.length === 3 * 3 ){
					containPoints()
				}
			}
			function setPolygonPosition(){
				polygon_buffergeometry.setAttribute( 'position', new THREE.BufferAttribute( new Float32Array(polygon_position), 3 ) );
				polygon_buffergeometry.attributes.position.needsUpdate = true;
			}
			function changeColor( index ){
				points_buffergeometry.getAttribute( 'customColor' ).setXYZ( index, 1.0, 1.0, 1.0 );
				points_buffergeometry.attributes.customColor.needsUpdate = true;
			}
			function containPoints(){
				const polygon_p = polygon_buffergeometry.getAttribute( 'position' );
				const point_p = points_buffergeometry.getAttribute( 'position' );
				for( let i = 0, len = point_p.count; i < len; i++ ){
					const point_v = new THREE.Vector2( point_p.getX(i), point_p.getY(i) );
					const
						p1 = new THREE.Vector2( polygon_p.getX(0), polygon_p.getY(0) ),
						p2 = new THREE.Vector2( polygon_p.getX(1), polygon_p.getY(1) ),
						p3 = new THREE.Vector2( polygon_p.getX(2), polygon_p.getY(2) );

					const
						d1 = getDirection( p1, p2, point_v ),
						d2 = getDirection( p2, p3, point_v ),
						d3 = getDirection( p3, p1, point_v );

					if( (d1 === d2 && d1 === d3) || 
						(d1 === 0 && d2 === 0 && d3 === 0) ){
						changeColor( i );
					}

				}
			}
			function getDirection( p1, p2, p3 ){
				let 
					v1 = new THREE.Vector2( p2.x - p1.x, p2.y - p1.y ),
					v2 = new THREE.Vector2( p3.x - p1.x, p3.y - p1.y ),
					direction = v1.x * v2.y - v1.y * v2.x ;

				if( direction < 0 ){//在右侧
					return 1;
				}else if( direction > 0 ){//在左侧
					return -1;
				}else if( direction === 0 ){//在同一条线上
					return 0;
				}else{
					throw new Error('计算出错,参数有误', direction);
				}
			}

			window.addEventListener( 'resize', onWindowResize );
			onWindowResize();
			function onWindowResize() {
				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				renderer.setSize( window.innerWidth, window.innerHeight );
			}

			animate();
			function animate() {

				requestAnimationFrame( animate );

				stats.update();
				// controls.update();
				renderer.render( scene, camera );

			}
		</script>
	</body>
</html>

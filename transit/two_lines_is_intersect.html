<!DOCTYPE html>
<html lang="en">
	<head>
		<title>two_lines_is_intersect</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<link type="text/css" rel="stylesheet" href="../../../examples/main.css">
	</head>

	<body>
		<canvas id="canvas"></canvas>
		<script type="module">

			import * as THREE from '../../../build/three.module.js';

			import Stats from '../../../examples/jsm/libs/stats.module.js';

			import { GUI } from '../../../examples/jsm/libs/dat.gui.module.js';
			import { OrbitControls } from '../../../examples/jsm/controls/OrbitControls.js';
			import { TransformControls } from '../../../examples/jsm/controls/TransformControls.js';

			import Vector2 from '../src/vector2.js'

			const renderer = new THREE.WebGLRenderer( {
				 antialias: true ,
				 canvas: document.getElementById('canvas')
			} );
			renderer.setPixelRatio( window.devicePixelRatio );
			renderer.setClearColor( 0x000000, 0.0 );
			renderer.setSize( window.innerWidth, window.innerHeight );
			document.body.appendChild( renderer.domElement );

			const scene = new THREE.Scene();

			const camera = new THREE.PerspectiveCamera( 60, window.innerWidth / window.innerHeight, 0.1, 1000 );
			camera.position.set( 0, 0, 10 );

			const orbit = new OrbitControls( camera, renderer.domElement );
			orbit.enableRotate = false;
			orbit.target.set(0, 0, 0);

			const stats = new Stats();
			document.body.appendChild( stats.dom );

			// 线1
			let line1V1 = new Vector2( -3, 0 ),
				line1V2 = new Vector2( 3, 0 ),
				line1Geometry = new THREE.BufferGeometry();
			line1Geometry.setAttribute( 'position', new THREE.BufferAttribute( new Float32Array([
				line1V1.x,
				line1V1.y,
				0,
				line1V2.x,
				line1V2.y,
				0
			]) , 3 ) );
			scene.add( new THREE.Line( line1Geometry, new THREE.LineBasicMaterial({
				color: 0xff0000,
			}) ) );
			// 线1的两个节点
			let planeLength = 0.2;
			let line1P1 = new THREE.Mesh( new THREE.PlaneGeometry( planeLength, planeLength ), new THREE.MeshBasicMaterial({
					color: 0xffffff,
					side: THREE.DoubleSide
				}) )
			line1P1.position.set( line1V1.x, line1V1.y, 0 );
			let line1P2 = new THREE.Mesh( new THREE.PlaneGeometry( planeLength, planeLength ), new THREE.MeshBasicMaterial({
					color: 0xffffff,
					side: THREE.DoubleSide
				}) )
			line1P2.position.set( line1V2.x, line1V2.y, 0 );

			// 线2
			let line2V1 = new Vector2( 0, -3 ),
				line2V2 = new Vector2( 0, 3 ),
				line2Geometry = new THREE.BufferGeometry();
			line2Geometry.setAttribute( 'position', new THREE.BufferAttribute( new Float32Array([
				line2V1.x,
				line2V1.y,
				0,
				line2V2.x,
				line2V2.y,
				0
			]) , 3 ) );
			scene.add( new THREE.Line( line2Geometry, new THREE.LineBasicMaterial({
				color: 0xff0000,
			}) ) );
			// 线2的两个节点
			let line2P1 = new THREE.Mesh( new THREE.PlaneGeometry( planeLength, planeLength ), new THREE.MeshBasicMaterial({
					color: 0xffffff,
					side: THREE.DoubleSide
				}) )
			line2P1.position.set( line2V1.x, line2V1.y, 0 );
			let line2P2 = new THREE.Mesh( new THREE.PlaneGeometry( planeLength, planeLength ), new THREE.MeshBasicMaterial({
					color: 0xffffff,
					side: THREE.DoubleSide
				}) )
			line2P2.position.set( line2V2.x, line2V2.y, 0 );

			let pointGeometry = new THREE.BufferGeometry(),
				pointMatrial = new THREE.PointsMaterial({
					color: 0xffffff,
					visible: false,
					size: 0.1
				});
			pointGeometry.setAttribute( 'position', new THREE.BufferAttribute( new Float32Array(3) , 3) );
			let pointPosition = pointGeometry.getAttribute( 'position' );
			scene.add( new THREE.Points( pointGeometry, pointMatrial ) );



			// 控制器
			let transformControls = new TransformControls( camera, renderer.domElement );
			transformControls.showZ = false;
			transformControls.addEventListener( 'dragging-changed', function ( event ) {
				orbit.enabled = ! event.value;
				if( !event.value ){
					console.log( '两条线段的相交情况', getIntersect() )
				}
			} );
			transformControls.addEventListener( 'objectChange', ( event )=>{
				selectPosition.array[ positionStart ] = selectPlane.position.x;
				selectPosition.array[ positionStart + 1 ] = selectPlane.position.y;
				selectPosition.array[ positionStart + 2 ] = 0;
				selectPosition.needsUpdate = true;

				selectVector.copy( selectPlane.position );
			} );
			scene.add( transformControls );

			let 
				line1Position = line1Geometry.getAttribute( 'position' ),
				line2Position = line2Geometry.getAttribute( 'position' ),
				positionStart = 0,
				planes = {
					line1Start: line1P1,
					line1End: line1P2,
					line2Start: line2P1,
					line2End: line2P2,
				},
				selectPlane = null,
				selectVector = null,
				selectPosition = null,
				gui = new GUI()
			
			gui.add( { selectPoint: 'null' }, 'selectPoint' ).options( [
				'null', 'line1Start', 'line1End', 'line2Start', 'line2End',
			 ] ).onFinishChange(( value )=>{
				if( selectPlane !== null ){
					transformControls.detach ( selectPlane );
					scene.remove( selectPlane );
				}
				if( value === 'null' ){
					selectPlane = null;
				}else{
					selectPlane = planes[value];
					scene.add( selectPlane );
					transformControls.attach( selectPlane );
				}
				switch ( value ){
					case 'null':
						selectPosition = null;
						selectVector = null;
						break;
					case 'line1Start':
						selectPosition = line1Position;
						selectVector = line1V1;
						positionStart = 0;
						break;
					case 'line1End':
						selectPosition = line1Position;
						selectVector = line1V2;
						positionStart = 3;
						break;
					case 'line2Start':
						selectPosition = line2Position;
						selectVector = line2V1;
						positionStart = 0;
						break;
					case 'line2End':
						selectPosition = line2Position;
						selectVector = line2V2;
						positionStart = 3;
						break;
				}
			});
			function getIntersect(){
				let line1 = line1V2.newSub( line1V1 ),
					line2 = line2V2.newSub( line2V1 ),

					line1V1Dir = line1V1.newSub( line2V1 ).cross( line2 ),
					line1V2Dir = line1V2.newSub( line2V1 ).cross( line2 ),
					line1VDir = line1V1Dir * line1V2Dir,

					line2V1Dir = line2V1.newSub( line1V1 ).cross( line1 ),
					line2V2Dir = line2V2.newSub( line1V1 ).cross( line1 ),
					line2VDir = line2V1Dir * line2V2Dir

				if( line1VDir <= 0 && line2VDir <= 0 ){
					var A1 = line1V2.y - line1V1.y,
						B1 = line1V1.x - line1V2.x,
						C1 = A1 * line1V1.x + B1 * line1V1.y,
						A2 = line2V2.y - line2V1.y,
						B2 = line2V1.x - line2V2.x,
						C2 = A2 * line2V1.x + B2 * line2V1.y,
						denominator = A1 * B2 - A2 * B1,

						intersection = {
							x: (B2 * C1 - B1 * C2) / denominator,
							y: (A1 * C2 - A2 * C1) / denominator
						};

						pointPosition.array[0] = intersection.x;
						pointPosition.array[1] = intersection.y;
						pointPosition.array[2] = 0;
						pointPosition.needsUpdate = true;

						pointMatrial.visible = true;

					return '相交，交点为：(x:' + intersection.x + ', y:' + intersection.y + ')'
				}else{
					pointMatrial.visible = false;
					return '不相交'
				}
			}
			window.getIntersect = getIntersect ;

			window.addEventListener( 'resize', onWindowResize );
			onWindowResize();
			function onWindowResize() {
				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				renderer.setSize( window.innerWidth, window.innerHeight );
			}

			animate();
			function animate() {
				requestAnimationFrame( animate );
				stats.update();
				renderer.render( scene, camera );

			}
		</script>
	</body>
</html>
